swagger: '2.0'

info:
  description: Provides access to classification and security mark related features.
  version: '1'
  title: Alfresco Governance Services Security Controls
basePath: /alfresco/api/-default-/public/gs/versions/1

securityDefinitions:
  basicAuth:
    type: basic
    description: HTTP Basic Authentication

security:
  - basicAuth: []

consumes:
  - application/json

produces:
  - application/json

tags:
  - name: classification-guides
    description: Retrieve and manage classification guides
  - name: classification-reasons
    description: Retrieve and manage classification reasons
  - name: declassification-exemptions
    description: Retrieve and manage declassification exemptions
  - name: security-control-settings
    description: Retrieve and manage security control settings
  - name: default-classification-values
    description: Retrieve and manage default classification values
  - name: highest-child-classification
    description: Retrieve highest child classification
  - name: secured-nodes
    description: Retrieve and manage securing marks
  - name: security-groups
    description: Retrieve and manage security groups
  - name: security-marks
    description: Retrieve and manage security marks

paths:
  /security-groups:
    get:
      summary: List all security groups
      description: Gets all security groups. There is a property `rm.securitygroup.any.onlyviewassigned` defined in alfresco-global.properties.
                  When this is set to true then users will only be able to view controls they have been assigned.
                  When it is set to false then users will be able to see all controls in a security group of type `ANY` if they have been assigned at least one of them.
      operationId: listSecurityGroups
      tags:
        - security-groups
      parameters:
        - $ref: '#/parameters/groupInclude'
        - $ref: '#/parameters/skipCountParam'
        - $ref: '#/parameters/maxItemsParam'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityGroupPaging'
        '401':
          $ref: '#/responses/401'
        default:
          $ref: '#/responses/default'
    post:
      summary: Create a security group
      description: Creates a new security group.
      operationId: createSecurityGroup
      tags:
        - security-groups
      parameters:
        - name: security-group
          description: Security Group
          in: body
          required: true
          schema:
            $ref: '#/definitions/SecurityGroupCreateBodyModel'
        - $ref: '#/parameters/groupInclude'
      responses:
        '201':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityGroupModel'
        '400':
          description: |
            **groupName** is a mandatory parameter or **groupType** is a mandatory parameter or the value provided for groupType
            is not one of the values accepted for Enum class: [HIERARCHICAL, USER_REQUIRES_ALL, USER_REQUIRES_ANY]
        '401':
          $ref: '#/responses/401'
        '403':
          description: "The user doesn't have permission to create a security group."
        '409':
          description: "A security group with the name **groupName** already exists."
        default:
          $ref: '#/responses/default'

  /security-groups/{securityGroupId}:
    get:
      summary: Get security group information
      description: Gets the security group with id **securityGroupId**.
      operationId: getSecurityGroup
      tags:
        - security-groups
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - $ref: '#/parameters/groupInclude'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityGroupModel'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format"
        '401':
          $ref: '#/responses/401'
        '404':
          description: "Could not find security group with id **securityGroupId**"
        default:
          $ref: '#/responses/default'
    put:
      tags:
        - security-groups
      summary: Update a security group
      description: Updates the security group with id **securityGroupId**. For example, you can rename a security group.
      operationId: updateSecurityGroup
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - name: security-group
          description: Security Group
          in: body
          required: true
          schema:
            $ref: '#/definitions/SecurityGroupUpdateBodyModel'
        - $ref: '#/parameters/groupInclude'
      produces:
        - application/json
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityGroupModel'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format or **groupName** is a mandatory parameter"
        '401':
          $ref: '#/responses/401'
        '403':
          description: "The user doesn't have permission to update a security group"
        '404':
          description: "Could not find security group with id **securityGroupId**"
        '409':
          description: "A security group with the name **groupName** already exists."
        default:
          $ref: '#/responses/default'
    delete:
      tags:
        - security-groups
      summary: Delete a security group
      description: Deletes the security group with id **securityGroupId**, including any marks.
      operationId: deleteSecurityGroup
      parameters:
        - $ref: '#/parameters/securityGroupId'
      responses:
        '204':
          $ref: '#/responses/204'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format"
        '401':
          $ref: '#/responses/401'
        '403':
          description: "The user doesn't have permission to delete a security group."
        '404':
          description: "Could not find security group with id **securityGroupId**"
        '422':
          description: |
            There is a problem with the internal state that prevents the delete of the security group, for example
            the security group with id **securityGroupId** is in use.
        default:
          $ref: '#/responses/default'

  /security-groups/{securityGroupId}/security-marks:
    get:
      summary: Gets all the marks in a security group
      description: Gets all the marks in a security group with id **securityGroupId**.
      operationId: getSecurityGroupMarks
      tags:
        - security-marks
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - $ref: '#/parameters/skipCountParam'
        - $ref: '#/parameters/maxItemsParam'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityMarksPaging'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format"
        '401':
          $ref: '#/responses/401'
        '404':
          description: "Could not find security group with id: **securityGroupId**"
        default:
          $ref: '#/responses/default'
    post:
      summary: Create a security mark in the security group with id **securityGroupId**.
      description: |
        Creates a new security mark.

        **Note:** You can create more than one security mark by specifying a list of marks in the JSON body.
        For example, the following JSON body creates two security marks:
        ```JSON
        [
        {
          "name":"SecurityMark1"
        },
        {
          "name":"SecurityMark2"
        }
        ]
        ```
        If you specify a list as input, then a paginated list rather than an entry is returned in the response body. For example:
        ```JSON
        {
          "list": {
            "pagination": {
              "count": 2,
              "hasMoreItems": false,
              "totalItems": 2,
              "skipCount": 0,
              "maxItems": 100
            },
            "entries": [
            {
              "entry": {
                         ...
              }
            },
            {
              "entry": {
                         ...
              }
            }
            ]
          }
        }
        ```
      operationId: createSecurityMark
      tags:
        - security-marks
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - name: security-mark
          description: Security Mark
          in: body
          required: true
          schema:
            $ref: '#/definitions/SecurityMarkBodyModel'
      responses:
        '201':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityMarkModel'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format or **name** is a mandatory parameter"
        '401':
          $ref: '#/responses/401'
        '403':
          description: "The user doesn't have permission to create a security mark"
        '404':
          description: "Could not find security group with id **securityGroupId**"
        '409':
          description: "A security mark with the name **name** already exists in the security group."
        '422':
          description: |
            There is a problem with the internal state that prevents adding security marks, for example the mark
            cannot be added to a system security group.
        default:
          $ref: '#/responses/default'

  /security-groups/{securityGroupId}/security-marks/{securityMarkId}:
    get:
      summary: Get security mark information
      description: Gets the security mark with id **securityMarkId** from security group with id **securityGroupId**.
      operationId: getSecurityGroupMark
      tags:
        - security-marks
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - $ref: '#/parameters/securityMarkId'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityMarkModel'
        '401':
          $ref: '#/responses/401'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format or **securityMarkId** is not in valid format"
        '404':
          description: "Could not find security mark with id **securityMarkId** or security group with id **securityGroupId**"
        default:
          $ref: '#/responses/default'
    put:
      tags:
        - security-marks
      summary: Update a security mark with id **securityMarkId**
      description: Updates the security mark with id **securityMarkId**. For example, you can rename a security mark.
      operationId: updateSecurityMark
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - $ref: '#/parameters/securityMarkId'
        - name: security-mark
          description: Security Mark
          in: body
          required: true
          schema:
            $ref: '#/definitions/SecurityMarkBodyModel'
      produces:
        - application/json
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecurityMarkModel'
        '400':
          description: |
            Invalid parameter: **securityGroupId** is not in valid format or **securityMarkId** is not in valid
            format or **name** is a mandatory parameter
        '401':
          $ref: '#/responses/401'
        '403':
          description: "The user doesn't have permission to update a security mark"
        '404':
          description: "Could not find security mark with id **securityMarkId** or security group with id **securityGroupId**"
        '409':
          description: "A security mark with the name **name** already exists in the security group."
        default:
          $ref: '#/responses/default'
    delete:
      tags:
        - security-marks
      summary: Delete a security mark from a security group
      description: Deletes the security mark with id **securityMarkId**.
      operationId: deleteSecurityMark
      parameters:
        - $ref: '#/parameters/securityGroupId'
        - $ref: '#/parameters/securityMarkId'
      responses:
        '204':
          $ref: '#/responses/204'
        '400':
          description: "Invalid parameter: **securityGroupId** is not in valid format or **securityMarkId** is not in valid format"
        '401':
          $ref: '#/responses/401'
        '403':
          description: "The user doesn't have permission to delete a security mark"
        '404':
          description: "Could not find security mark with id **securityMarkId** or security group with id **securityGroupId**"
        '422':
          description: |
            There is a problem with the internal state that prevents the delete of the security mark, for example the
            security mark with id **securityMarkId** is a member of **securityGroupId** which is in use.
        default:
          $ref: '#/responses/default'

  '/secured-nodes/{nodeId}/securing-marks':
    get:
      summary: List all security marks assigned to a node.
      description: List all the existing security marks assigned to a node with id **nodeId**.
      operationId: getSecuringMarks
      produces:
        - application/json
      tags:
        - secured-nodes
      parameters:
        - $ref: '#/parameters/nodeIdParam'
        - $ref: '#/parameters/skipCountParam'
        - $ref: '#/parameters/maxItemsParam'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/SecuringMarksPaging'
        '400':
          description: |
            Invalid parameter: **nodeId** is not in valid format
        '401':
          $ref: '#/responses/401'
        '403':
          description: >-
            Current user does not have permission to retrieve security marks assigned to
            **nodeId**
        '404':
          description: "**nodeId** does not exist"
        '405':
          description: "Classification is not supported for **nodeId**"
        default:
          $ref: '#/responses/default'

    post:
      summary: Manage the existing security marks for a node
      description: Manage the list of existing security marks for a node with id **nodeId**.
      operationId: updateSecuringMarks
      produces:
        - application/json
      tags:
        - secured-nodes
      parameters:
        - $ref: '#/parameters/nodeIdParam'
        - in: body
          name: securityMarksUpdates
          description: The list of security marks updates.
          required: true
          schema:
            $ref: '#/definitions/SecurityMarksUpdateBody'
      responses:
        '201':
          description: Successful response
          schema:
            $ref: '#/definitions/SecuringMarksPaging'
        '400':
          description: >
            Invalid parameter: **nodeId** is not in a valid format or the **securityMarksUpdate** is invalid
        '401':
          $ref: '#/responses/401'
        '403':
          description: >-
            Current user does not have permission to update
            **nodeId**
        '404':
          description: '**nodeId** does not exist'
        '405':
          description: "Classification is not supported for **nodeId**"
        '422':
          description: |
            There is a problem with the internal state that prevents the update of security marks for a node,
            for example current user would lose access to **nodeId**.
        default:
          $ref: '#/responses/default'

  /classification-guides:
    get:
      summary: List all classification guides
      description: Gets all classification guides.
      operationId: listClassificationGuides
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/guideInclude'
        - $ref: '#/parameters/skipCountParam'
        - $ref: '#/parameters/maxItemsParam'
        - $ref: '#/parameters/orderByParam'
        - name: where
          in: query
          description: |
            A string to restrict the returned objects by using a predicate. Supported operations are AND, NOT, and OR. Fields to filter on:
            * enabled - e.g. (enabled = true OR enabled = false)
          required: false
          type: string
      responses:
        '200':
          description: A paged array of classifications
          schema:
            $ref: '#/definitions/ClassificationGuidePaging'
        '401':
          $ref: '#/responses/401'
        default:
          $ref: '#/responses/default'

    post:
      summary: Create a classification guide
      description: Creates a new classification guide.
      operationId: createClassificationGuide
      tags:
        - classification-guides
      parameters:
        - name: classificationGuide
          description: Classification guide
          in: body
          required: true
          schema:
            $ref: '#/definitions/ClassificationGuideBody'
      responses:
        '201':
          description: Successful response
          schema:
            $ref: '#/definitions/ClassificationGuideEntry'
        '400':
          description: |
            Invalid parameter: The **classificationGuide** is invalid
        '401':
          $ref: '#/responses/401'
        '403':
          description: Current user doesn't have permission to create classification guides
        '409':
          description: There's already a classification guide with this name
        '422':
          description: Couldn't create guide. Guide name can't end in a period or contain any of these characters "*\>&lt;?/|
        default:
          $ref: '#/responses/default'


  /classification-guides/{classificationGuideId}:

    get:
      summary: Get classification guide information
      description: Gets the classification guide with id **classificationGuideId**.
      operationId: showClassificationGuideById
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/classificationGuideId'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/ClassificationGuideEntry'
        '400':
          description: |
            Invalid parameter: **classificationGuideId** is not in valid format
        '401':
          $ref: '#/responses/401'
        '404':
          description: "**classificationGuideId** does not exist"
        default:
          $ref: '#/responses/default'

    put:
      tags:
        - classification-guides
      summary: Update a classification guide
      description: Updates the classification guide with id **classificationGuideId**. For example, you can rename a classification guide.
      operationId: updateClassificationGuide
      parameters:
        - $ref: '#/parameters/classificationGuideId'
        - name: classificationGuide
          description: Classification guide
          in: body
          required: true
          schema:
            $ref: '#/definitions/ClassificationGuideBody'
      produces:
        - application/json
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/ClassificationGuideEntry'
        '400':
          description: |
            Invalid parameter: **classificationGuideId** is not in a valid format or the **classificationGuide** is invalid
        '401':
          $ref: '#/responses/401'
        '403':
          description: Current user does not have permission to update the guide with id **classificationGuideId**
        '404':
          description: "**classificationGuideId** does not exist"
        '409':
          description: Name clashes with an existing classification guide
        '422':
          description: Couldn't edit guide. Guide name can't end in a period or contain any of these characters "*\>&lt;?/|
        default:
          $ref: '#/responses/default'

    delete:
      tags:
        - classification-guides
      summary: Delete a classification guide
      description: Deletes the classification guide with id **classificationGuideId**, including any topics and instructions.
      operationId: deleteClassificationGuide
      parameters:
        - $ref: '#/parameters/classificationGuideId'
      responses:
        '204':
          $ref: '#/responses/204'
        '400':
          description: |
            Invalid parameter: **classificationGuideId** is not in a valid format
        '401':
          $ref: '#/responses/401'
        '403':
          description: |
            Current user does not have permission to delete **classificationGuideId** or one of its descendents
        '404':
          description: "**classificationGuideId** does not exist"
        default:
          $ref: '#/responses/default'


  /classification-guides/{classificationGuideId}/topics:

    get:
      summary: List all topics
      description: Gets all topics.
      operationId: listTopics
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/classificationGuideId'
        - $ref: '#/parameters/topicInclude'
        - $ref: '#/parameters/skipCountParam'
        - $ref: '#/parameters/maxItemsParam'
        - $ref: '#/parameters/orderByParam'
        - name: where
          in: query
          description: |
            A string to restrict the returned objects by using a predicate. Supported operations are AND, NOT, and OR e.g. (instruction=true and hasSubtopics=false). Fields to filter on:
            * hasInstruction
            * hasSubtopics

          required: false
          type: string
        - $ref: '#/parameters/includeSourceParam'
      responses:
        '200':
          description: An paged array of topics
          schema:
            $ref: '#/definitions/TopicPaging'
        '400':
          description: |
            Invalid parameter: **classificationGuideId** is not in valid format
        '401':
          $ref: '#/responses/401'
        '404':
          description: "**classificationGuideId** does not exist"
        default:
          $ref: '#/responses/default'

    post:
      summary: Create a topic
      description: Creates a new topic.
      operationId: createTopic
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/classificationGuideId'
        - name: topic
          description: Topic
          in: body
          required: true
          schema:
            $ref: '#/definitions/TopicBody'
        - $ref: '#/parameters/topicInclude'
      responses:
        '201':
          description: Successful response
          schema:
            $ref: '#/definitions/TopicEntry'
        '400':
          description: |
            Invalid parameter: The **classificationGuideId** is not a valid format
            or the **topic** is invalid.
        '401':
          $ref: '#/responses/401'
        '403':
          description: Current user doesn't have permission to create a topic under this classification guide
        '404':
          description: "**classificationGuideId** does not exist"
        '409':
          description: Name clashes with an existing topic in this classification guide
        '422':
          description: The supplied security marks would cause the user to lose access to the topic.
        default:
          $ref: '#/responses/default'


  /topics/{topicId}:

    get:
      summary: Get topic information
      description: Gets the topic with id **topicId**.
      operationId: showTopicById
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/topicId'
        - $ref: '#/parameters/topicInclude'
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/TopicEntry'
        '400':
          description: |
            Invalid parameter: **topicId** is not in a valid format
        '401':
          $ref: '#/responses/401'
        '404':
          description: "**topicId** does not exist or the current user doesn't have permission to view the instruction for this topic"
        default:
          $ref: '#/responses/default'

    put:
      tags:
        - classification-guides
      summary: Update a topic
      description: |
        Updates the topic with id **topicId**.

        Use this to rename a topic or to add, edit, or remove the instruction associated with it.
      operationId: updateTopic
      parameters:
        - $ref: '#/parameters/topicId'
        - name: topic
          description: Topic
          in: body
          required: true
          schema:
            $ref: '#/definitions/TopicBody'
        - $ref: '#/parameters/topicInclude'
      produces:
        - application/json
      responses:
        '200':
          description: Successful response
          schema:
            $ref: '#/definitions/TopicEntry'
        '400':
          description: |
            Invalid parameter: **topicId** is not a valid format, the **topic** is
            invalid or if this is an attempt to add an instruction to a topic which
            has subtopics.
        '401':
          $ref: '#/responses/401'
        '403':
          description: Current user does not have permission to update the topic with id **topicId**
        '404':
          description: "**topicId** does not exist or the current user doesn't have permission to view the instruction for this topic"
        '409':
          description: Name clashes with an existing topic in this classification guide
        '422':
          description: The supplied security marks would cause the user to lose access to the topic.
        default:
          $ref: '#/responses/default'

    delete:
      tags:
        - classification-guides
      summary: Delete a topic
      description: Deletes the topic with id  **topicId**, including any subtopics and instructions.
      operationId: deleteTopic
      parameters:
        - $ref: '#/parameters/topicId'
      responses:
        '204':
          $ref: '#/responses/204'
        '400':
          description: |
            Invalid parameter: **topicId** is not in a valid format
        '401':
          $ref: '#/responses/401'
        '403':
          description: Current user does not have permission to delete **topicId** or one of its descendents
        '404':
          description: |
            "**topicId** does not exist or the current user doesn't have permission to view the instruction for this topic"
        default:
          $ref: '#/responses/default'


  /topics/{topicId}/subtopics:

    get:
      summary: List all subtopics
      description: Gets all subtopics of a topic.
      operationId: listSubtopics
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/topicId'
        - $ref: '#/parameters/topicInclude'
        - $ref: '#/parameters/skipCountParam'
        - $ref: '#/parameters/maxItemsParam'
        - $ref: '#/parameters/orderByParam'
        - name: where
          in: query
          description: |
            A string to restrict the returned objects by using a predicate. Supported operations are AND, NOT, and OR. Fields to filter on:
            * hasInstruction
            * hasSubtopics
          required: false
          type: string
        - $ref: '#/parameters/includeSourceParam'
      responses:
        '200':
          description: An paged array of subtopics
          schema:
            $ref: '#/definitions/SubtopicPaging'
        '401':
          $ref: '#/responses/401'
        '404':
          description: "**topicId** does not exist or the current user doesn't have permission to view the instruction for this topic"
        default:
          $ref: '#/responses/default'

    post:
      summary: Create a subtopic
      description: Creates a new subtopic of a topic.
      operationId: createSubtopic
      tags:
        - classification-guides
      parameters:
        - $ref: '#/parameters/topicId'
        - name: topic
          description: Subtopic
          in: body
          required: true
          schema:
            $ref: '#/definitions/TopicBody'
        - $ref: '#/parameters/topicInclude'
      responses:
        '201':
          description: Successful response
          schema:
            $ref: '#/definitions/TopicEntry'
        '400':
          description: |
            Invalid parameter: The **topicId** is not in a valid format, the subtopic
            **topic** is invalid
        '401':
          $ref: '#/responses/401'
        '403':
          description: Current user doesn't have permission to create a subtopic under this topic
        '404':
          description: |
            "**topicId** does not exist or the current user doesn't have permission
            to view the instruction for the parent topic"
        '409':
          description: Name clashes with an existing subtopic of this topic
        '422':
          description: |
            Parent topic already has an instruction and so cannot contain subtopics, or the supplied security marks
            would cause the user to lose access to the topic.
        default:
          $ref: '#/responses/default'


  /combined-instructions:

    post:
      summary: Combined instructions
      description: Combines instructions from the given topics and the user defined instruction, if any.
      operationId: combinedInstructions
      tags:
        - classification-guides
      parameters:
        - name: instructions
          description: Instructions
          in: body
          required: false
          schema:
            $ref: '#/definitions/CombinedInstructionBody'
      responses:
        '200':
          description: An instruction that represents the combination of all the specified instructions.
          schema:
            $ref: '#/definitions/InstructionEntry'
