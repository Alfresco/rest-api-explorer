name: Publish to GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - '.github/gh-pages/**'
      - 'src/main/webapp/definitions/**'

env:
  SWAGGER_UI_VERSION: 4.19.1

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AGS_TARGET_PATH: enterprise-repo
      AGS_SWAGGER_FILE_PATH: amps/ags/rm-enterprise/rm-enterprise-rest-api-explorer/src/main/webapp/definitions/gs-classification-api.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout AGS definition
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Alfresco/alfresco-enterprise-repo
          ref: master
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          sparse-checkout: ${{ env.AGS_TARGET_PATH }}
          sparse-checkout-cone-mode: false
          path: ${{ env.AGS_TARGET_PATH }}

      - name: Copy AGS definition
        run: cp ${{ env.AGS_TARGET_PATH }}/${{ env.AGS_SWAGGER_FILE_PATH }} src/main/webapp/definitions/

      - name: Build
        working-directory: .github/gh-pages
        run: ./build.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: .github/gh-pages/build/dist


  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
